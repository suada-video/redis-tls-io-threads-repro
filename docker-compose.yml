services:
  redis:
    image: redis:8.2.1
    entrypoint: ["redis-server"]
    command: ["/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - ./redis.conf:/etc/redis/redis.conf:ro
      - ./certs:/tls:ro
    networks:
      impaired:
        ipv4_address: 172.28.0.10

  client:
    build:
      context: ./client
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TLS_CA=/tls/ca.crt
      - TLS_CERT=/tls/client.crt
      - TLS_KEY=/tls/client.key
      - NUM_CONNECTIONS=${NUM_CONNECTIONS:-30}
      - NUM_JOBS=${NUM_JOBS:-50000}
      - HGETALL_BATCH=${HGETALL_BATCH:-10000}
      - TEST_DURATION_SECONDS=${TEST_DURATION_SECONDS:-120}
      - ENABLE_AUTO_PIPELINING=${ENABLE_AUTO_PIPELINING:-true}
      # Network impairment - gentler settings to add latency without killing connections
      - NETEM_DELAY_MS=${NETEM_DELAY_MS:-15}
      - NETEM_LOSS_PCT=${NETEM_LOSS_PCT:-0.1}
      - NETEM_RATE_KBIT=${NETEM_RATE_KBIT:-10000000}
    volumes:
      - ./certs:/tls:ro
    networks:
      impaired:
        ipv4_address: 172.28.0.20

networks:
  impaired:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
