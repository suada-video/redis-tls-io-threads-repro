# Redis config with io-threads 1 (control group — should NOT reproduce the bug)
# All other settings identical to redis.conf

tls-port 6379
port 0
tls-cert-file /tls/server.crt
tls-key-file /tls/server.key
tls-ca-cert-file /tls/ca.crt
tls-auth-clients yes

# io-threads DISABLED — single-threaded I/O
io-threads 1

client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 0 0 0
client-output-buffer-limit pubsub 0 0 0
timeout 0
tcp-keepalive 30
maxmemory 1gb
maxmemory-policy noeviction
save ""
appendonly no
loglevel verbose
bind 0.0.0.0
protected-mode no
