# Redis 8.x TLS + large response bug reproducer config

# TLS
tls-port 6379
port 0
tls-cert-file /tls/server.crt
tls-key-file /tls/server.key
tls-ca-cert-file /tls/ca.crt
tls-auth-clients yes

# io-threads — test with 1 and 6
# Even with 1, the bug triggers when TLS + large responses + network backpressure
io-threads 6

# Unlimited output buffers (don't kill clients for large responses)
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 0 0 0
client-output-buffer-limit pubsub 0 0 0

# No timeout — don't kill idle clients
timeout 0
tcp-keepalive 30

# Small TCP send buffer to increase partial SSL_write frequency
# (Default is kernel-managed ~87380 bytes; reducing forces more partial writes)
# tcp-backlog 128

# Memory
maxmemory 2gb
maxmemory-policy noeviction

# Persistence off (not needed for reproducer)
save ""
appendonly no

# Debug logging to capture SSL errors
loglevel debug

# Accept connections
bind 0.0.0.0
protected-mode no
