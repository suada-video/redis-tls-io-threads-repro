# Redis 8.x TLS + io-threads bug reproducer config

# TLS
tls-port 6379
port 0
tls-cert-file /tls/server.crt
tls-key-file /tls/server.key
tls-ca-cert-file /tls/ca.crt
tls-auth-clients yes

# io-threads — THIS IS THE BUG TRIGGER
# Set to 6 to reproduce; set to 1 to verify fix
io-threads 6

# Unlimited output buffers (don't kill clients for large responses)
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 0 0 0
client-output-buffer-limit pubsub 0 0 0

# No timeout — don't kill idle clients
timeout 0
tcp-keepalive 30

# Memory
maxmemory 1gb
maxmemory-policy noeviction

# Persistence off (not needed for reproducer)
save ""
appendonly no

# Verbose logging to capture SSL errors
loglevel verbose

# Accept connections
bind 0.0.0.0
protected-mode no
